<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>十一中学学生论坛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"宋体",SimSun;}
body{background:#f0f0f0;font-size:14px;}
.top-bar{display:flex;justify-content:space-between;background:#000080;color:#fff;padding:8px 15px;font-size:12px;}
.banner{background:#b8d4f0;padding:20px;text-align:center;border-bottom:2px solid #999;}
.banner h1{color:#000080;}
.sub-nav{display:flex;flex-wrap:wrap;background:#fff;border-bottom:1px solid #ccc;}
.sub-nav-item{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;color:#00c;}
.sub-nav-item img{width:16px;height:16px;}
.main{display:flex;max-width:1000px;margin:10px auto;gap:10px;padding:0 10px;}
.left{flex:7;}
.right{flex:3;}
.box{background:#fff;border:1px solid #ccc;margin-bottom:10px;}
.box-tit{background:#000080;color:#fff;padding:6px 10px;font-weight:bold;}
.forum-inner{display:flex;padding:10px;gap:10px;}
.forum-img{width:120px;height:100px;object-fit:cover;cursor:pointer;}
.article{line-height:1.8;}
.article a,.list a,.hot-list a{color:#0000cc;text-decoration:none;display:block;margin:4px 0;}
.article a:hover,.list a:hover,.hot-list a:hover{color:#0066ff;text-decoration:underline;}
.list{padding:8px;line-height:1.8;}
.list li{list-style:none;padding-left:10px;position:relative;}
.list li:before{content:"•";position:absolute;left:0;color:#00c;}
.login-body{padding:10px;}
.login-item{margin:8px 0;}
.login-item input{padding:4px;width:100%;}
.radio-box{margin:10px 0;font-size:12px;}
.btn-group{display:flex;gap:10px;margin-top:10px;}
.btn{padding:6px 10px;background:#000080;color:#fff;border:none;cursor:pointer;}
.ad-box{background:#fff;border:1px solid #ccc;padding:10px;margin-bottom:10px;text-align:center;font-size:12px;line-height:1.6;cursor:pointer;}
.beer-ad{background:#fff8e1;color:#900;}
.ring-ad{background:#e1f8ff;color:#009;}
.hot-list{padding:8px;line-height:1.8;list-style:none;}
.hot-list li{padding-left:10px;position:relative;}
.hot-list li:before{content:"🔹";position:absolute;left:0;}
.hot-list a{color:#c00;}
/* 2003古老贴吧弹窗 */
.tieba-pop{display:none;position:fixed;top:50%;left:50%;transform: translate(-50%,-50%);width:700px;height:85vh;background:#fff;padding:15px;border:2px solid #666;overflow-y:auto;z-index:999;font-family:"宋体";}
.tieba-pop .tieba-title{font-size:18px;color:#000099;font-weight:bold;margin-bottom:15px;border-bottom:1px solid #ccc;padding-bottom:8px;}
.tieba-pop .floor{border-bottom:1px dotted #aaa;padding:8px 0;line-height:1.6;font-size:14px;}
.tieba-pop .floor .uid{color:#990000;margin-right:10px;}
.tieba-pop .floor .time{color:#666;font-size:12px;margin-left:10px;}
.tieba-pop .floor .text{margin-top:4px;}
/* 文章弹窗 */
.article-pop{display:none;position:fixed;top:50%;left:50%;transform: translate(-50%,-50%);width:600px;background:#fff;padding:20px;border:2px solid #000080;z-index:998;}
.article-pop img{width:100%;height:220px;object-fit:cover;margin:10px 0;}
.article-pop h3{color:#000080;margin-bottom:10px;}
.article-pop p{line-height:1.7;font-size:14px;white-space:pre-line;}
.close{margin-top:10px;padding:5px 10px;background:#000099;color:#fff;border:none;cursor:pointer;}
/* 校友录弹窗 真人照片100%可用 */
.alumni-pop{display:none;position:fixed;top:50%;left:50%;transform: translate(-50%,-50%);width:480px;background:#fff;padding:20px;border:2px solid #000080;z-index:1000;font-family:"宋体";}
.alumni-pop h3{color:#000080;text-align:center;margin-bottom:15px;font-size:20px;}
.alumni-img{width:240px;height:280px;object-fit:cover;display:block;margin:0 auto 20px;border:1px solid #999;}
.alumni-comment{line-height:2;font-size:16px;padding:0 5px;}
.alumni-comment .user{color:#c00;font-weight:bold;display:block;margin-top:8px;}
/* 互动样式 */
.sub-nav-item:hover { background: #e6f2ff; }
.btn:hover { background: #0000aa; }
.ad-box:hover { background: #fff3e0; }
.list li:hover { background: #f8fcff; }
.hot-list li:hover { background: #fff0f0; }
.article a:hover { background: #f0f7ff; padding-left:4px; }
.forum-img:hover { opacity: 0.8; transform:scale(1.02); }
</style>
</head>
<body>

    <div>青春驿站<br>校园文学·绝对原创<br>校园论坛·毕业求职</div>
    <div>时尚之苑<br>情感·商城·粤人谷<br>奇闻·聊天·伊甸园</div>

</div>
